name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          # CI=false prevents CRA from treating ESLint warnings as errors.
          # TypeScript strict mode in tsconfig.json handles type safety.
          CI: false

      - name: Report build output size
        run: |
          echo "=== Build output ==="
          du -sh build/
          echo "=== JS bundles ==="
          ls -lh build/static/js/*.js 2>/dev/null || echo "No JS bundles found"

      - name: Show Vercel deployment URL
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting up to 90s for Vercel to post deployment status..."
          for i in $(seq 1 9); do
            STATUS=$(gh api \
              repos/${{ github.repository }}/commits/${{ github.sha }}/statuses \
              --jq '[.[] | select(.context | startswith("vercel"))] | first' 2>/dev/null || echo "null")
            STATE=$(echo "$STATUS" | jq -r '.state // "pending"')
            URL=$(echo "$STATUS"   | jq -r '.target_url // ""')
            if [ "$STATE" = "success" ] && [ -n "$URL" ]; then
              echo "✓ Vercel deployment ready: $URL"
              break
            elif [ "$STATE" = "failure" ]; then
              echo "✗ Vercel deployment failed. Check: https://vercel.com/dashboard"
              break
            fi
            echo "  Attempt $i/9: Vercel state=$STATE — retrying in 10s..."
            sleep 10
          done
